<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ファイトカマキリ</title>
  <style>
    body { margin: 0; background: #222; color: white; text-align: center; }
    canvas { background: #333; display: block; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>ファイトカマキリ</h1>
  <p>←→で移動 / スペースで攻撃</p>
  <canvas id="game" width="600" height="400"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let player = { x: 50, y: 300, w: 40, h: 40, hp: 100 };
    let enemy = { x: 500, y: 300, w: 40, h: 40, hp: 100 };

    let keys = {};
    let playerAttack = false;
    let enemyAttack = false;

    document.addEventListener("keydown", e => keys[e.code] = true);
    document.addEventListener("keyup", e => keys[e.code] = false);

    function update() {
      // プレイヤー移動
      if (keys["ArrowLeft"]) player.x -= 5;
      if (keys["ArrowRight"]) player.x += 5;

      // 攻撃
      if (keys["Space"]) playerAttack = true;
      else playerAttack = false;

      // 敵AI（近づいて攻撃）
      if (enemy.x > player.x) enemy.x -= 2;
      else enemy.x += 2;

      if (Math.abs(enemy.x - player.x) < 50) {
        enemyAttack = Math.random() < 0.05;
      }

      // 当たり判定
      if (playerAttack && Math.abs(player.x - enemy.x) < 50) {
        enemy.hp -= 1;
      }

      if (enemyAttack && Math.abs(player.x - enemy.x) < 50) {
        player.hp -= 1;
      }

      // HP制限
      player.hp = Math.max(player.hp, 0);
      enemy.hp = Math.max(enemy.hp, 0);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // プレイヤー（緑）
      ctx.fillStyle = "lime";
      ctx.fillRect(player.x, player.y, player.w, player.h);

      // 敵（赤）
      ctx.fillStyle = "red";
      ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

      // HP表示
      ctx.fillStyle = "white";
      ctx.fillText("自分HP: " + player.hp, 20, 20);
      ctx.fillText("敵HP: " + enemy.hp, 480, 20);

      // 終了判定
      if (player.hp <= 0) {
        ctx.fillText("負け...", 260, 200);
        return;
      }
      if (enemy.hp <= 0) {
        ctx.fillText("勝ち！", 260, 200);
        return;
      }

      requestAnimationFrame(loop);
    }

    function loop() {
      update();
      draw();
    }

    loop();
  </script>
</body>
</html>
