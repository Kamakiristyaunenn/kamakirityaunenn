<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カマキリバトル（かんたん版）</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #a8e063, #56ab2f);
      font-family: sans-serif;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #003300;
      font-weight: bold;
      background: rgba(255,255,255,0.6);
      padding: 8px;
      border-radius: 10px;
    }
    #uploader {
      position: absolute;
      top: 60px;
      left: 10px;
    }
    canvas { display: block; }
  </style>
</head>
<body>

<div id="info">矢印キー：移動 / スペース：攻撃</div>
<input type="file" id="uploader" accept="image/*">
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mantisImg = null;

// 画像アップロードで設定
const uploader = document.getElementById("uploader");
uploader.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    mantisImg = new Image();
    mantisImg.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

let player = { x: 100, y: 100, size: 100, speed: 5, attacking: false };
let enemy = { x: 500, y: 300, size: 100, alive: true };
let keys = {};

document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if (e.key === " ") player.attacking = true;
});

document.addEventListener("keyup", e => {
  keys[e.key] = false;
  if (e.key === " ") player.attacking = false;
});

function update() {
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  if (player.attacking && enemy.alive) {
    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 100) enemy.alive = false;
  }
}

function drawMantis(x, y, size) {
  if (mantisImg) {
    ctx.drawImage(mantisImg, x, y, size, size);
  } else {
    // 画像がないときの仮表示
    ctx.fillStyle = "green";
    ctx.fillRect(x, y, size, size);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawMantis(player.x, player.y, player.size);

  if (enemy.alive) {
    drawMantis(enemy.x, enemy.y, enemy.size);
  } else {
    ctx.fillStyle = "#003300";
    ctx.font = "30px sans-serif";
    ctx.fillText("勝利！", enemy.x, enemy.y);
  }

  if (player.attacking) {
    ctx.fillStyle = "rgba(255,0,0,0.3)";
    ctx.beginPath();
    ctx.arc(player.x + 50, player.y + 50, 60, 0, Math.PI * 2);
    ctx.fill();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
